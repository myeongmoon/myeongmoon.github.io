<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Skull Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        /* UI 오버레이 */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* 타이틀 */
        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        .main-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #00ffff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #ff00ff,
                0 5px 20px rgba(0, 0, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            letter-spacing: 4px;
        }

        /* 네비게이션 */
        .nav-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            text-decoration: none;
            border: 2px solid #00ffff;
            border-radius: 5px;
            transition: all 0.3s;
            z-index: 1000;
            font-size: 14px;
            font-weight: 700;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        /* 스코어보드 */
        .scoreboard {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 30px;
            border: 2px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .score-item {
            margin: 10px 0;
            font-size: 1rem;
            color: #fff;
            font-weight: 700;
        }

        .score-label {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .score-value {
            color: #ff00ff;
            font-size: 1.8rem;
            margin-left: 15px;
            text-shadow: 0 0 10px #ff00ff;
        }

        /* 안내 */
        .info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 1rem;
            font-weight: 700;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 2px;
            z-index: 100;
        }

        /* 닉네임 모달 */
        .nickname-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            pointer-events: auto;
        }

        .nickname-modal.hidden {
            display: none;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0a1a 0%, #0a0a1a 100%);
            padding: 50px;
            border: 3px solid #00ffff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 3rem;
            color: #00ffff;
            margin-bottom: 20px;
            font-weight: 900;
            text-shadow: 0 0 20px #00ffff;
        }

        .modal-subtitle {
            color: #ff00ff;
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-shadow: 0 0 10px #ff00ff;
        }

        .modal-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            border-radius: 10px;
            margin-bottom: 25px;
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            outline: none;
            text-align: center;
        }

        .modal-input::placeholder {
            color: rgba(0, 255, 255, 0.3);
        }

        .modal-btn {
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }

        /* 게임오버 모달 */
        .gameover-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            pointer-events: auto;
        }

        .gameover-modal.hidden {
            display: none;
        }

        .gameover-content {
            background: linear-gradient(135deg, #1a0a1a 0%, #0a0a1a 100%);
            padding: 60px;
            border: 3px solid #ff00ff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.5);
        }

        .gameover-title {
            font-size: 4rem;
            color: #ff00ff;
            margin-bottom: 30px;
            font-weight: 900;
            text-shadow: 0 0 30px #ff00ff;
        }

        .final-score {
            font-size: 2.5rem;
            color: #00ffff;
            margin: 20px 0;
            text-shadow: 0 0 20px #00ffff;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff00ff 0%, #00ffff 100%);
            color: #000;
            border: none;
            padding: 20px 50px;
            font-size: 1.3rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin: 10px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <a href="index.html" class="nav-btn">← HOME</a>

        <div class="title">
            <h1 class="main-title">💎 DIAMOND SKULL 💎</h1>
            <p class="subtitle">CATCH THE SKULLS</p>
        </div>

        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">PLAYER</span>
                <span class="score-value" style="font-size: 1.2rem;" id="playerName">-</span>
            </div>
            <div class="score-item">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">MISSED</span>
                <span class="score-value" id="missed">0</span> / 3
            </div>
        </div>

        <div class="info">💀 Click on SKULLS only! Avoid ❤️ and 💎</div>
    </div>

    <!-- 닉네임 모달 -->
    <div class="nickname-modal" id="nicknameModal">
        <div class="modal-content">
            <h2 class="modal-title">💎☠️💎</h2>
            <p class="modal-subtitle">Enter Your Name</p>
            <input type="text" class="modal-input" id="nicknameInput" placeholder="PLAYER NAME" maxlength="12">
            <button class="modal-btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <!-- 게임오버 모달 -->
    <div class="gameover-modal hidden" id="gameoverModal">
        <div class="gameover-content">
            <h2 class="gameover-title">GAME OVER</h2>
            <p class="final-score">FINAL SCORE: <span id="finalScore">0</span></p>
            <p style="color: #fff; margin: 20px 0;">
                Player: <span style="color: #00ffff;" id="finalPlayer">-</span>
            </p>
            <button class="restart-btn" onclick="location.reload()">PLAY AGAIN</button>
            <button class="restart-btn" onclick="location.href='index.html'">GO HOME</button>
        </div>
    </div>

    <script>
        // 캔버스 설정
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 게임 변수
        let playerName = '';
        let score = 0;
        let missed = 0;
        const MAX_MISSED = 3;
        let gameOver = false;
        let speedMultiplier = 1;
        let gameStarted = false;

        // 이미지 로드
        const skullImg = new Image();
        skullImg.src = 'skull-image.jpg';

        // 중앙 해골
        const mainSkull = {
            x: width / 2,
            y: height / 2,
            width: 400,
            height: 400,
            mouthOpen: 0.7, // 0~1 (1이 완전히 벌림)
            isChewing: false,
            targetMouthOpen: 0.7
        };

        // 떠다니는 오브젝트
        class FlyingObject {
            constructor(type, y) {
                this.type = type; // 'skull', 'heart', 'diamond'
                this.x = -100;
                this.y = y;
                this.size = 60;
                this.speed = (2 + Math.random()) * speedMultiplier;
                this.clicked = false;
                this.rotation = 0;
            }

            update() {
                if (gameOver) return;
                
                this.x += this.speed;
                this.rotation += 0.02;

                // 화면 밖으로 나가면
                if (this.x > width + 100) {
                    if (this.type === 'skull' && !this.clicked) {
                        missed++;
                        document.getElementById('missed').textContent = missed;
                        if (missed >= MAX_MISSED) {
                            endGame();
                        }
                    }
                    return true; // 제거
                }
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                if (this.type === 'skull') {
                    // 해골 (회색 다이아몬드)
                    ctx.fillStyle = '#aaaaaa';
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size/2);
                    ctx.lineTo(this.size/2, 0);
                    ctx.lineTo(0, this.size/2);
                    ctx.lineTo(-this.size/2, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    // 눈
                    ctx.fillStyle = '#000';
                    ctx.fillRect(-15, -10, 10, 10);
                    ctx.fillRect(5, -10, 10, 10);
                    
                } else if (this.type === 'heart') {
                    // 하트
                    ctx.fillStyle = '#ff0066';
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 3;
                    
                    const size = this.size / 2;
                    ctx.beginPath();
                    ctx.moveTo(0, size/4);
                    ctx.bezierCurveTo(-size/2, -size/3, -size, -size/6, -size/2, size/2);
                    ctx.lineTo(0, size);
                    ctx.lineTo(size/2, size/2);
                    ctx.bezierCurveTo(size, -size/6, size/2, -size/3, 0, size/4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                } else if (this.type === 'diamond') {
                    // 다이아몬드
                    ctx.fillStyle = '#00ffff';
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00ffff';
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size/2);
                    ctx.lineTo(this.size/2, 0);
                    ctx.lineTo(0, this.size/2);
                    ctx.lineTo(-this.size/2, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }

            isClicked(mouseX, mouseY) {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size / 2;
            }
        }

        let objects = [];
        let objectSpawnTimer = 0;

        // 오브젝트 생성
        function spawnObject() {
            const types = ['skull', 'heart', 'diamond'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            objects.push(new FlyingObject(randomType, height / 2));
        }

        // 중앙 해골 그리기
        function drawMainSkull() {
            const skull = mainSkull;
            
            ctx.save();
            ctx.translate(skull.x, skull.y);

            // 해골 이미지 그리기
            const imgWidth = skull.width;
            const imgHeight = skull.height;
            
            // 상단 (머리 부분)
            ctx.save();
            ctx.translate(0, -skull.mouthOpen * 30);
            ctx.drawImage(
                skullImg,
                0, 0, skullImg.width, skullImg.height * 0.6,
                -imgWidth/2, -imgHeight/2, imgWidth, imgHeight * 0.6
            );
            ctx.restore();

            // 하단 (턱 부분)
            ctx.save();
            ctx.translate(0, skull.mouthOpen * 30);
            ctx.drawImage(
                skullImg,
                0, skullImg.height * 0.6, skullImg.width, skullImg.height * 0.4,
                -imgWidth/2, -imgHeight/2 + imgHeight * 0.6, imgWidth, imgHeight * 0.4
            );
            ctx.restore();

            // 글로우 효과
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 5;
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#00ffff';
            ctx.strokeRect(-imgWidth/2, -imgHeight/2, imgWidth, imgHeight);
            ctx.shadowBlur = 0;

            ctx.restore();

            // 입 애니메이션
            if (skull.isChewing) {
                skull.mouthOpen += (skull.targetMouthOpen - skull.mouthOpen) * 0.2;
                
                if (Math.abs(skull.mouthOpen - skull.targetMouthOpen) < 0.01) {
                    if (skull.targetMouthOpen === 0) {
                        skull.targetMouthOpen = 0.7;
                        skull.isChewing = false;
                    } else {
                        skull.targetMouthOpen = 0;
                    }
                }
            }
        }

        // 파티클 효과
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = 5 + Math.random() * 5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life -= 0.02;
                return this.life > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        let particles = [];

        function createParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // 마우스 클릭
        canvas.addEventListener('click', (e) => {
            if (!gameStarted || gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 오브젝트 클릭 체크
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                if (obj.isClicked(mouseX, mouseY) && !obj.clicked) {
                    obj.clicked = true;

                    // 해골 씹는 애니메이션
                    mainSkull.isChewing = true;
                    mainSkull.targetMouthOpen = 0;

                    if (obj.type === 'skull') {
                        score++;
                        document.getElementById('score').textContent = score;
                        createParticles(obj.x, obj.y, '#ff00ff');
                    } else {
                        score = Math.max(0, score - 1);
                        document.getElementById('score').textContent = score;
                        createParticles(obj.x, obj.y, '#ff0000');
                    }

                    objects.splice(i, 1);
                    break;
                }
            }
        });

        // 게임 시작
        function startGame() {
            const input = document.getElementById('nicknameInput');
            const nickname = input.value.trim();
            
            if (nickname === '') {
                alert('Please enter your name!');
                return;
            }
            
            playerName = nickname;
            document.getElementById('playerName').textContent = playerName;
            document.getElementById('nicknameModal').classList.add('hidden');
            gameStarted = true;
            
            // 15초마다 속도 증가
            setInterval(() => {
                if (!gameOver && gameStarted) {
                    speedMultiplier += 0.3;
                }
            }, 15000);
        }

        // 게임 종료
        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalPlayer').textContent = playerName;
            document.getElementById('gameoverModal').classList.remove('hidden');
        }

        // Enter 키
        document.getElementById('nicknameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGame();
        });

        // 애니메이션 루프
        function animate() {
            // 배경
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // 그리드 배경
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, height);
                ctx.stroke();
            }
            for (let i = 0; i < height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(width, i);
                ctx.stroke();
            }

            if (gameStarted && !gameOver) {
                // 오브젝트 생성
                objectSpawnTimer++;
                if (objectSpawnTimer > 60 / speedMultiplier) {
                    spawnObject();
                    objectSpawnTimer = 0;
                }

                // 오브젝트 업데이트
                objects = objects.filter(obj => {
                    obj.update();
                    obj.draw();
                    return !obj.update();
                });
            }

            // 중앙 해골
            if (skullImg.complete) {
                drawMainSkull();
            }

            // 파티클 업데이트
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });

            requestAnimationFrame(animate);
        }

        // 리사이즈
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mainSkull.x = width / 2;
            mainSkull.y = height / 2;
        });

        // 이미지 로드 후 시작
        skullImg.onload = () => {
            animate();
        };
    </script>
</body>
</html>
