<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truman's Escape - Climb to Freedom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a2d3d;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87ceeb 0%, #4a90a4 50%, #2a5f7e 100%);
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }

        .ui div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            z-index: 100;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: linear-gradient(135deg, #2a5f7e, #1a4d6d);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .modal-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .modal input {
            width: 300px;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #fff;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            text-align: center;
            margin: 20px 0;
        }

        .modal button {
            padding: 15px 50px;
            font-size: 1.2rem;
            background: #fff;
            color: #1a4d6d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .modal button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div>🎬 <span id="playerName">-</span></div>
        <div>🏃 <span id="cleared">0</span>/50</div>
        <div>❤️ <span id="lives">3</span></div>
    </div>

    <div class="controls">⌨️ SPACEBAR to JUMP</div>

    <div class="modal" id="startModal">
        <div class="modal-content">
            <div class="modal-title">TRUMAN'S ESCAPE</div>
            <p style="color: #b8d4e6; margin-bottom: 20px;">Climb the stairs to freedom!</p>
            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="15">
            <br>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <div class="modal hidden" id="gameoverModal">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <p style="color: #fff; font-size: 1.5rem; margin: 20px 0;">
                Cleared: <span id="finalCleared">0</span>/50
            </p>
            <button onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <div class="modal hidden" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🚪 FREEDOM!</div>
            <p style="color: #fff; font-size: 1.5rem; margin: 20px 0;">
                You escaped! Cleared all 50 obstacles!
            </p>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 게임 상태
        let gameStarted = false;
        let gameOver = false;
        let cleared = 0;
        let lives = 3;
        
        // 플레이어
        const player = {
            x: 100,
            y: canvas.height - 150,
            width: 40,
            height: 60,
            velocityY: 0,
            jumping: false,
            speed: 3  // 5 → 3 (느리게)
        };
        
        // 계단들
        const stairs = [];
        const STAIR_WIDTH = 200;
        const STAIR_HEIGHT = 25;
        
        // 첫 계단 생성
        for (let i = 0; i < 60; i++) {
            stairs.push({
                x: i * 180,
                y: canvas.height - 100 - (i * 70),
                width: STAIR_WIDTH,
                height: STAIR_HEIGHT
            });
        }
        
        // 장애물들
        const obstacles = [];
        
        // 50개 장애물 생성 (간격 넓게)
        for (let i = 0; i < 50; i++) {
            const stairIndex = 4 + (i * 2); // 4번째 계단부터 2칸씩 (더 넓은 간격)
            if (stairs[stairIndex]) {
                const types = ['📹', '💡', '📦'];
                obstacles.push({
                    x: stairs[stairIndex].x + 75,
                    y: stairs[stairIndex].y - 50,
                    width: 50,
                    height: 50,
                    type: types[Math.floor(Math.random() * types.length)],
                    passed: false,
                    hit: false
                });
            }
        }
        
        // 카메라
        let cameraX = 0;
        
        // 키보드
        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && !player.jumping && gameStarted) {
                player.velocityY = -18;  // -16 → -18 (더 높이 점프)
                player.jumping = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        
        // 게임 시작
        function startGame() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name!');
                return;
            }
            document.getElementById('playerName').textContent = name;
            document.getElementById('startModal').classList.add('hidden');
            gameStarted = true;
        }
        
        // 충돌 체크
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 업데이트
        function update() {
            if (!gameStarted || gameOver) return;
            
            // 중력
            player.velocityY += 0.5;  // 0.6 → 0.5 (더 천천히 떨어짐)
            player.y += player.velocityY;
            
            // 계단 충돌
            let onGround = false;
            stairs.forEach(stair => {
                if (checkCollision(player, {
                    x: stair.x - cameraX,
                    y: stair.y,
                    width: stair.width,
                    height: stair.height
                }) && player.velocityY >= 0) {
                    player.y = stair.y - player.height;
                    player.velocityY = 0;
                    player.jumping = false;
                    onGround = true;
                }
            });
            
            // 카메라 이동 (플레이어가 화면 중앙보다 오른쪽에 있으면)
            if (player.x > canvas.width / 3) {
                cameraX += player.speed;
                player.x -= player.speed;
            }
            
            // 계속 앞으로 이동
            player.x += player.speed;
            
            // 장애물 체크
            obstacles.forEach(obs => {
                const obsScreenX = obs.x - cameraX;
                
                // 충돌 체크
                if (!obs.hit && checkCollision(player, {
                    x: obsScreenX,
                    y: obs.y,
                    width: obs.width,
                    height: obs.height
                })) {
                    obs.hit = true;
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    
                    if (lives <= 0) {
                        gameOver = true;
                        document.getElementById('finalCleared').textContent = cleared;
                        document.getElementById('gameoverModal').classList.remove('hidden');
                    }
                }
                
                // 통과 체크
                if (!obs.passed && player.x > obs.x + obs.width) {
                    obs.passed = true;
                    cleared++;
                    document.getElementById('cleared').textContent = cleared;
                    
                    if (cleared >= 50) {
                        gameOver = true;
                        document.getElementById('winModal').classList.remove('hidden');
                    }
                }
            });
            
            // 떨어지면 게임오버
            if (player.y > canvas.height) {
                lives = 0;
                gameOver = true;
                document.getElementById('finalCleared').textContent = cleared;
                document.getElementById('gameoverModal').classList.remove('hidden');
            }
        }
        
        // 그리기
        function draw() {
            // 배경 클리어
            ctx.fillStyle = 'rgba(135, 206, 235, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 계단 그리기
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 3;
            
            stairs.forEach(stair => {
                const x = stair.x - cameraX;
                if (x > -300 && x < canvas.width + 100) {
                    ctx.fillRect(x, stair.y, stair.width, stair.height);
                    ctx.strokeRect(x, stair.y, stair.width, stair.height);
                }
            });
            
            // 장애물 그리기
            obstacles.forEach(obs => {
                const x = obs.x - cameraX;
                if (x > -100 && x < canvas.width + 100 && !obs.hit) {
                    ctx.font = '40px Arial';
                    ctx.fillText(obs.type, x, obs.y + 40);
                }
            });
            
            // 플레이어 그리기
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            
            // 머리
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 15, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // 몸
            ctx.fillRect(player.x + 12, player.y + 25, 16, 25);
            ctx.strokeRect(player.x + 12, player.y + 25, 16, 25);
            
            // 다리
            ctx.fillRect(player.x + 10, player.y + 48, 8, 12);
            ctx.strokeRect(player.x + 10, player.y + 48, 8, 12);
            ctx.fillRect(player.x + 22, player.y + 48, 8, 12);
            ctx.strokeRect(player.x + 22, player.y + 48, 8, 12);
            
            // 팔
            ctx.fillRect(player.x + 6, player.y + 28, 6, 14);
            ctx.strokeRect(player.x + 6, player.y + 28, 6, 14);
            ctx.fillRect(player.x + 28, player.y + 28, 6, 14);
            ctx.strokeRect(player.x + 28, player.y + 28, 6, 14);
        }
        
        // 게임 루프
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
        
        // 리사이즈
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
