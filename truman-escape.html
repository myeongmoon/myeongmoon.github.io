<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truman's Escape - Climb to Freedom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a2d3d;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87ceeb 0%, #4a90a4 50%, #2a5f7e 100%);
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }

        .ui div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            z-index: 100;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: linear-gradient(135deg, #2a5f7e, #1a4d6d);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .modal-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .modal input {
            width: 300px;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #fff;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            text-align: center;
            margin: 20px 0;
        }

        .modal button {
            padding: 15px 50px;
            font-size: 1.2rem;
            background: #fff;
            color: #1a4d6d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .modal button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div>🎬 <span id="playerName">-</span></div>
        <div>🏃 <span id="cleared">0</span>/50</div>
        <div>❤️ <span id="lives">3</span></div>
    </div>

    <div class="controls">⌨️ SPACEBAR to JUMP</div>

    <div class="modal" id="startModal">
        <div class="modal-content">
            <div class="modal-title">TRUMAN'S ESCAPE</div>
            <p style="color: #b8d4e6; margin-bottom: 20px;">Climb the stairs to freedom!</p>
            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="15">
            <br>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <div class="modal hidden" id="gameoverModal">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <p style="color: #fff; font-size: 1.5rem; margin: 20px 0;">
                Cleared: <span id="finalCleared">0</span>/50
            </p>
            <button onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <div class="modal hidden" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🚪 FREEDOM!</div>
            <p style="color: #fff; font-size: 1.5rem; margin: 20px 0;">
                You escaped! Cleared all 50 obstacles!
            </p>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 게임 상태
        let gameStarted = false;
        let gameOver = false;
        let cleared = 0;
        let lives = 3;
        
        // 배경 이미지
        const bgImages = [];
        let bgLoaded = 0;
        
        for (let i = 1; i <= 3; i++) {
            const img = new Image();
            img.src = `truman-bg${i}.webp`;
            img.onload = () => {
                bgLoaded++;
            };
            bgImages.push(img);
        }
        
        // 플레이어 (화면 중앙에 고정)
        const player = {
            x: canvas.width / 2 - 20,  // 화면 중앙
            y: canvas.height / 2 - 30,  // 화면 중앙
            width: 40,
            height: 60,
            velocityY: 0,
            jumping: false,
            speed: 4.5,  // 3 → 4.5 (50% 빠르게)
            worldX: 200,  // 실제 월드 좌표
            worldY: canvas.height - 150  // 실제 월드 좌표
        };
        
        // 계단들
        const stairs = [];
        const STAIR_WIDTH = 200;
        const STAIR_HEIGHT = 25;
        
        // 충분한 계단 생성 (150개)
        for (let i = 0; i < 150; i++) {
            stairs.push({
                x: i * 180,
                y: canvas.height - 100 - (i * 70),
                width: STAIR_WIDTH,
                height: STAIR_HEIGHT
            });
        }
        
        // 마지막 장애물이 있는 계단 기준으로 출구 배치
        const lastObstacleStairIndex = 4 + (49 * 2); // 102번째 계단
        const exitStairIndex = Math.min(lastObstacleStairIndex + 3, stairs.length - 1); // 3칸 뒤
        const exitStair = stairs[exitStairIndex];
        const exitDoor = {
            x: exitStair.x + exitStair.width / 2 - 60,
            y: exitStair.y - 180,
            width: 120,
            height: 160
        };
        
        // 장애물들
        const obstacles = [];
        
        // 50개 장애물 생성 (간격 넓게)
        for (let i = 0; i < 50; i++) {
            const stairIndex = 4 + (i * 2); // 4번째 계단부터 2칸씩 (더 넓은 간격)
            if (stairs[stairIndex]) {
                const types = ['📹', '💡', '📦'];
                obstacles.push({
                    x: stairs[stairIndex].x + 75,
                    y: stairs[stairIndex].y - 50,
                    width: 50,
                    height: 50,
                    type: types[Math.floor(Math.random() * types.length)],
                    passed: false,
                    hit: false
                });
            }
        }
        
        // 카메라
        let cameraX = 0;
        let cameraY = 0;  // Y축 카메라 추가
        
        // 키보드
        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && !player.jumping && gameStarted) {
                player.velocityY = -18;
                player.jumping = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        
        // 게임 시작
        function startGame() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Please enter your name!');
                return;
            }
            document.getElementById('playerName').textContent = name;
            document.getElementById('startModal').classList.add('hidden');
            gameStarted = true;
        }
        
        // 충돌 체크
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 업데이트
        function update() {
            if (!gameStarted || gameOver) return;
            
            // 중력
            player.velocityY += 0.5;
            player.worldY += player.velocityY;
            
            // 계단 충돌
            let onGround = false;
            stairs.forEach(stair => {
                if (player.worldX < stair.x + stair.width &&
                    player.worldX + player.width > stair.x &&
                    player.worldY < stair.y + stair.height &&
                    player.worldY + player.height > stair.y &&
                    player.velocityY >= 0) {
                    
                    player.worldY = stair.y - player.height;
                    player.velocityY = 0;
                    player.jumping = false;
                    onGround = true;
                }
            });
            
            // 플레이어 월드 이동 (자동으로 앞으로)
            player.worldX += player.speed;
            
            // 카메라는 플레이어 따라감 (중앙 고정)
            cameraX = player.worldX - canvas.width / 2;
            cameraY = player.worldY - canvas.height / 2;
            
            // 장애물 체크
            obstacles.forEach(obs => {
                // 충돌 체크 (월드 좌표로)
                if (!obs.hit && 
                    player.worldX < obs.x + obs.width &&
                    player.worldX + player.width > obs.x &&
                    player.worldY < obs.y + obs.height &&
                    player.worldY + player.height > obs.y) {
                    
                    obs.hit = true;
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    
                    if (lives <= 0) {
                        gameOver = true;
                        document.getElementById('finalCleared').textContent = cleared;
                        document.getElementById('gameoverModal').classList.remove('hidden');
                    }
                }
                
                // 통과 체크
                if (!obs.passed && player.worldX > obs.x + obs.width) {
                    obs.passed = true;
                    cleared++;
                    document.getElementById('cleared').textContent = cleared;
                    
                    if (cleared >= 50) {
                        // 모든 장애물 클리어 - 출구 도달 체크
                        checkExitReached();
                    }
                }
            });
            
            // 출구 도달 체크
            if (cleared >= 50) {
                checkExitReached();
            }
            
            // 떨어지면 게임오버
            if (player.worldY > canvas.height + 500) {
                lives = 0;
                gameOver = true;
                document.getElementById('finalCleared').textContent = cleared;
                document.getElementById('gameoverModal').classList.remove('hidden');
            }
        }
        
        // 출구 도달 체크
        function checkExitReached() {
            if (gameOver) return;
            
            // 출구 문에 닿았는지 체크
            if (player.worldX + player.width > exitDoor.x &&
                player.worldX < exitDoor.x + exitDoor.width &&
                player.worldY + player.height > exitDoor.y &&
                player.worldY < exitDoor.y + exitDoor.height) {
                
                gameOver = true;
                document.getElementById('winModal').classList.remove('hidden');
            }
        }
        
        // 그리기
        function draw() {
            // 배경 그라데이션
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(0.5, '#6fa8ba');
            gradient.addColorStop(1, '#4a90a4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 배경 이미지 (트루먼쇼)
            if (bgLoaded > 0) {
                ctx.save();
                ctx.globalAlpha = 0.15;
                const bgIndex = Math.floor(cleared / 20) % bgImages.length;
                const img = bgImages[bgIndex];
                if (img.complete) {
                    // 패럴렉스 효과
                    const bgX = -(cameraX * 0.3) % canvas.width;
                    const bgY = -(cameraY * 0.3) % canvas.height;
                    ctx.drawImage(img, bgX, bgY, canvas.width, canvas.height);
                    ctx.drawImage(img, bgX + canvas.width, bgY, canvas.width, canvas.height);
                }
                ctx.restore();
            }
            
            // 구름
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 5; i++) {
                const cloudX = ((i * 400 - cameraX * 0.5) % (canvas.width + 400)) - 200;
                const cloudY = 100 + (i * 50) - (cameraY * 0.2);
                if (cloudY > -100 && cloudY < canvas.height + 100) {
                    ctx.beginPath();
                    ctx.arc(cloudX, cloudY, 40, 0, Math.PI * 2);
                    ctx.arc(cloudX + 30, cloudY, 50, 0, Math.PI * 2);
                    ctx.arc(cloudX + 60, cloudY, 40, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // 계단 그리기
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 3;
            
            stairs.forEach(stair => {
                const x = stair.x - cameraX;
                const y = stair.y - cameraY;
                if (x > -300 && x < canvas.width + 100 && y > -100 && y < canvas.height + 100) {
                    // 계단 그림자
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    ctx.fillRect(x + 5, y + 5, stair.width, stair.height);
                    
                    // 계단
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x, y, stair.width, stair.height);
                    ctx.strokeRect(x, y, stair.width, stair.height);
                    
                    // 계단 앞면
                    ctx.fillStyle = '#e0e0e0';
                    ctx.fillRect(x, y + stair.height, stair.width, 8);
                }
            });
            
            // 장애물 그리기
            obstacles.forEach(obs => {
                const x = obs.x - cameraX;
                const y = obs.y - cameraY;
                if (x > -100 && x < canvas.width + 100 && y > -100 && y < canvas.height + 100 && !obs.hit) {
                    ctx.font = '40px Arial';
                    ctx.fillText(obs.type, x, y + 40);
                    
                    // 그림자
                    ctx.globalAlpha = 0.3;
                    ctx.fillText(obs.type, x + 2, y + 42);
                    ctx.globalAlpha = 1;
                }
            });
            
            // 출구 문 그리기 (50개 클리어 후)
            if (cleared >= 50) {
                const doorX = exitDoor.x - cameraX;
                const doorY = exitDoor.y - cameraY;
                
                if (doorX > -200 && doorX < canvas.width + 200) {
                    ctx.save();
                    
                    // 빛나는 효과
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#fff';
                    
                    // 문 프레임 (하얀색)
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(doorX, doorY, exitDoor.width, exitDoor.height);
                    
                    // 문 안쪽 (파란색)
                    ctx.fillStyle = '#1a4d6d';
                    ctx.fillRect(doorX + 10, doorY + 10, exitDoor.width - 20, exitDoor.height - 20);
                    
                    // 문 손잡이
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(doorX + exitDoor.width - 30, doorY + exitDoor.height / 2, 10, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // EXIT 텍스트
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Cinzel';
                    ctx.textAlign = 'center';
                    ctx.fillText('EXIT', doorX + exitDoor.width / 2, doorY - 20);
                    
                    // 화살표
                    ctx.font = '30px Arial';
                    ctx.fillText('↑', doorX + exitDoor.width / 2, doorY - 50);
                    
                    ctx.restore();
                    ctx.textAlign = 'left';
                }
            }
            
            // 플레이어 그리기 (화면 중앙 고정)
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#1a4d6d';
            ctx.lineWidth = 2;
            
            const px = player.x;
            const py = player.y;
            
            // 그림자
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(px + 20, py + player.height + 3, 20, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            
            // 머리
            ctx.beginPath();
            ctx.arc(px + 20, py + 15, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // 몸
            ctx.fillRect(px + 12, py + 25, 16, 25);
            ctx.strokeRect(px + 12, py + 25, 16, 25);
            
            // 다리
            ctx.fillRect(px + 10, py + 48, 8, 12);
            ctx.strokeRect(px + 10, py + 48, 8, 12);
            ctx.fillRect(px + 22, py + 48, 8, 12);
            ctx.strokeRect(px + 22, py + 48, 8, 12);
            
            // 팔
            ctx.fillRect(px + 6, py + 28, 6, 14);
            ctx.strokeRect(px + 6, py + 28, 6, 14);
            ctx.fillRect(px + 28, py + 28, 6, 14);
            ctx.strokeRect(px + 28, py + 28, 6, 14);
        }
        
        // 게임 루프
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
        
        // 리사이즈
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
