<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Gallery - 유기적 그래픽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container {
            position: absolute;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            filter: brightness(0.85) contrast(1.1);
        }

        .image-container:hover {
            transform: scale(1.15) !important;
            filter: brightness(1) contrast(1.2);
            z-index: 100 !important;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* 각 이미지 개별 스타일 */
        .img-1 {
            width: 400px;
            height: 600px;
            top: 10%;
            left: 10%;
            animation: float1 8s ease-in-out infinite;
            z-index: 4;
        }

        .img-2 {
            width: 500px;
            height: 500px;
            top: 15%;
            right: 15%;
            animation: float2 10s ease-in-out infinite;
            z-index: 3;
        }

        .img-3 {
            width: 450px;
            height: 550px;
            bottom: 15%;
            left: 15%;
            animation: float3 9s ease-in-out infinite;
            z-index: 2;
        }

        .img-4 {
            width: 480px;
            height: 480px;
            bottom: 10%;
            right: 12%;
            animation: float4 11s ease-in-out infinite;
            z-index: 1;
        }

        /* 떠다니는 애니메이션 - 각기 다른 패턴 */
        @keyframes float1 {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(-15px, -20px) rotate(-2deg);
            }
            50% {
                transform: translate(10px, -30px) rotate(1deg);
            }
            75% {
                transform: translate(-10px, -15px) rotate(-1deg);
            }
        }

        @keyframes float2 {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(20px, -15px) rotate(2deg);
            }
            50% {
                transform: translate(-15px, -25px) rotate(-1deg);
            }
            75% {
                transform: translate(15px, -10px) rotate(1.5deg);
            }
        }

        @keyframes float3 {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(-20px, 15px) rotate(-1.5deg);
            }
            50% {
                transform: translate(15px, 25px) rotate(2deg);
            }
            75% {
                transform: translate(-10px, 10px) rotate(-1deg);
            }
        }

        @keyframes float4 {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(15px, 20px) rotate(1deg);
            }
            50% {
                transform: translate(-20px, 30px) rotate(-2deg);
            }
            75% {
                transform: translate(10px, 15px) rotate(1.5deg);
            }
        }

        /* 배경 그라데이션 펄스 효과 */
        .gradient-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%),
                rgba(170, 255, 150, 0.1) 0%,
                rgba(150, 255, 180, 0.05) 30%,
                transparent 60%
            );
            pointer-events: none;
            animation: gradientPulse 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes gradientPulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* 픽셀 도트 오버레이 */
        .pixel-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 4px 4px;
            pointer-events: none;
            animation: pixelMove 20s linear infinite;
            z-index: 5;
        }

        @keyframes pixelMove {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(4px);
            }
        }

        /* 타이틀 */
        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 0;
            text-align: center;
            line-height: 1.2;
        }

        /* 네비게이션 버튼 */
        .nav-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            font-weight: 600;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 반응형 */
        @media (max-width: 1400px) {
            .img-1, .img-2, .img-3, .img-4 {
                width: 350px;
                height: 450px;
            }
            .title {
                font-size: 80px;
            }
        }

        @media (max-width: 900px) {
            .img-1, .img-2, .img-3, .img-4 {
                width: 250px;
                height: 350px;
            }
            .title {
                font-size: 50px;
                letter-spacing: 10px;
            }
            .nav-btn {
                top: 20px;
                left: 20px;
                padding: 10px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="nav-btn">← Home</a>

    <div class="container">
        <!-- 배경 그라데이션 레이어 -->
        <div class="gradient-layer"></div>
        
        <!-- 픽셀 오버레이 -->
        <div class="pixel-overlay"></div>

        <!-- 타이틀 -->
        <div class="title">
            ORGANIC<br>SPACE
        </div>

        <!-- 이미지들 -->
        <div class="image-container img-1">
            <img src="images/00a4797b3e3b4ade1cf495fb4964ca20.jpg" alt="Spa Space Store">
        </div>

        <div class="image-container img-2">
            <img src="images/9f4a213ba2abc6c4e5bee1a27c80d6ab.jpg" alt="Backrooms Opening">
        </div>

        <div class="image-container img-3">
            <img src="images/1c43a9af7c6fcaf3527081df87c89dec.jpg" alt="ArcMatrix">
        </div>

        <div class="image-container img-4">
            <img src="images/cec3f31d6ef6db54fe2905807417d054.jpg" alt="Green Circles">
        </div>
    </div>

    <script>
        // 마우스 위치 추적으로 그라데이션 이동
        const gradientLayer = document.querySelector('.gradient-layer');
        
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            gradientLayer.style.setProperty('--x', `${x}%`);
            gradientLayer.style.setProperty('--y', `${y}%`);
        });

        // 이미지 클릭 시 전체화면
        const images = document.querySelectorAll('.image-container');
        let fullscreenMode = false;

        images.forEach((img, index) => {
            img.addEventListener('click', () => {
                if (!fullscreenMode) {
                    // 전체화면 모드
                    img.style.position = 'fixed';
                    img.style.top = '50%';
                    img.style.left = '50%';
                    img.style.transform = 'translate(-50%, -50%) scale(1.3)';
                    img.style.width = '80vw';
                    img.style.height = '80vh';
                    img.style.zIndex = '1000';
                    img.style.animation = 'none';
                    
                    // 다른 이미지들 숨김
                    images.forEach((otherImg, otherIndex) => {
                        if (otherIndex !== index) {
                            otherImg.style.opacity = '0';
                            otherImg.style.pointerEvents = 'none';
                        }
                    });
                    
                    fullscreenMode = true;
                } else {
                    // 원래대로 복구
                    img.style.position = '';
                    img.style.top = '';
                    img.style.left = '';
                    img.style.transform = '';
                    img.style.width = '';
                    img.style.height = '';
                    img.style.zIndex = '';
                    img.style.animation = '';
                    
                    images.forEach((otherImg) => {
                        otherImg.style.opacity = '1';
                        otherImg.style.pointerEvents = 'auto';
                    });
                    
                    fullscreenMode = false;
                }
            });
        });

        // 랜덤한 초기 위치 살짝 조정 (더 유기적으로)
        images.forEach((img) => {
            const randomDelay = Math.random() * 2;
            img.style.animationDelay = `${randomDelay}s`;
        });

        // 스크롤로 줌 효과
        let scale = 1;
        document.addEventListener('wheel', (e) => {
            if (!fullscreenMode) {
                e.preventDefault();
                scale += e.deltaY * -0.001;
                scale = Math.min(Math.max(0.8, scale), 1.3);
                
                images.forEach((img) => {
                    const currentTransform = img.style.transform || '';
                    if (!currentTransform.includes('scale')) {
                        img.style.transform = `${currentTransform} scale(${scale})`;
                    }
                });
            }
        }, { passive: false });
    </script>
</body>
</html>
