<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face of Gradient - Organic Motion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .container {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            perspective: 1500px;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 105, 180, 0.6), 0 0 120px rgba(0, 255, 255, 0.3);
        }

        #organicCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .energy-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.6;
        }

        .title {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 900;
            background: linear-gradient(90deg, #ff69b4, #ffa500, #00ffff, #ff69b4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
            text-align: center;
            letter-spacing: 2px;
        }

        @keyframes gradient-shift {
            0%, 100% {
                background-position: 0% center;
            }
            50% {
                background-position: 100% center;
            }
        }

        .info {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            text-align: center;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
        }

        .control-panel label {
            display: block;
            margin: 5px 0;
        }

        .gallery-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 105, 180, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 2px solid rgba(255, 105, 180, 0.5);
            font-size: 14px;
            font-weight: 600;
        }

        .gallery-btn:hover {
            background: rgba(255, 105, 180, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        .umbrella-btn {
            position: fixed;
            top: 80px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            font-weight: 600;
        }

        .umbrella-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.3);
        }

        .shield-btn {
            position: fixed;
            top: 140px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(74, 144, 226, 0.15);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 2px solid rgba(74, 144, 226, 0.4);
            font-size: 14px;
            font-weight: 600;
        }

        .shield-btn:hover {
            background: rgba(74, 144, 226, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 144, 226, 0.5);
        }

        .noise-btn {
            position: fixed;
            top: 200px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            font-weight: 600;
        }

        .noise-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .pixel-btn {
            position: fixed;
            top: 260px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(92, 76, 60, 0.8);
            color: #f5f1e8;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 2px solid rgba(92, 76, 60, 0.4);
            font-size: 14px;
            font-weight: 600;
        }

        .pixel-btn:hover {
            background: rgba(92, 76, 60, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(92, 76, 60, 0.5);
        }

        .wind-btn {
            position: fixed;
            top: 320px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(232, 230, 50, 0.8);
            color: #000000;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
            border: 2px solid rgba(0, 0, 0, 0.3);
            font-size: 14px;
            font-weight: 600;
        }

        .wind-btn:hover {
            background: rgba(232, 230, 50, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(232, 230, 50, 0.6);
        }

        @media (max-width: 768px) {
            .title {
                top: -60px;
            }
            .info {
                bottom: -50px;
                font-size: 0.8rem;
            }
            .control-panel {
                font-size: 0.7rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <a href="gallery.html" class="gallery-btn">🎨 Gallery</a>
    <a href="umbrella.html" class="umbrella-btn">☂️ Umbrella</a>
    <a href="umbrella-shield.html" class="shield-btn">🛡️ Shield</a>
    <a href="noise-rain.html" class="noise-btn">◾ Noise</a>
    <a href="pixel-umbrella.html" class="pixel-btn">▬ Pixel</a>
    <a href="wind-umbrella.html" class="wind-btn">🌪️ Wind</a>
    
    <div class="container">
        <div class="title">FACE OF GRADIENT</div>
        
        <div class="scene" id="scene">
            <div class="canvas-wrapper">
                <canvas id="organicCanvas"></canvas>
                <canvas id="energyLines" class="energy-lines"></canvas>
            </div>
        </div>
        
        <div class="control-panel">
            <div>🎨 유기적 움직임</div>
            <label>강도: <span id="strengthValue">50</span>%</label>
        </div>
        
        <div class="info">🖱️ 마우스로 움직이거나 클릭해보세요 • 살아있는 듯한 움직임</div>
    </div>

    <script>
        const canvas = document.getElementById('organicCanvas');
        const ctx = canvas.getContext('2d');
        const energyCanvas = document.getElementById('energyLines');
        const energyCtx = energyCanvas.getContext('2d');
        const scene = document.getElementById('scene');
        
        let width, height;
        let img = new Image();
        let segments = [];
        let connections = [];
        let mouse = { x: 0, y: 0, isDown: false };
        let time = 0;

        // 캔버스 크기 설정
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            width = wrapper.clientWidth;
            height = wrapper.clientHeight;
            canvas.width = width;
            canvas.height = height;
            energyCanvas.width = width;
            energyCanvas.height = height;
        }

        // 이미지의 영역을 유기적 세그먼트로 분할
        class Segment {
            constructor(x, y, w, h, index) {
                this.x = x;
                this.y = y;
                this.width = w;
                this.height = h;
                this.index = index;
                this.offsetX = 0;
                this.offsetY = 0;
                this.velocityX = 0;
                this.velocityY = 0;
                this.targetOffsetX = 0;
                this.targetOffsetY = 0;
                this.phase = Math.random() * Math.PI * 2;
                this.frequency = 0.5 + Math.random() * 1.5;
                this.amplitude = 5 + Math.random() * 10;
                this.rotation = 0;
                this.scale = 1;
                this.brightness = 1;
            }

            update(time, mouseInfluence) {
                // 자체 진동 (호흡하는 듯한)
                const breathX = Math.sin(time * this.frequency + this.phase) * this.amplitude;
                const breathY = Math.cos(time * this.frequency * 0.7 + this.phase) * this.amplitude * 0.7;
                
                // 마우스 영향
                const dx = mouse.x - (this.x + this.width / 2);
                const dy = mouse.y - (this.y + this.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                const maxDistance = 300;
                
                if (distance < maxDistance) {
                    const force = (1 - distance / maxDistance) * mouseInfluence;
                    this.targetOffsetX = -dx * force * 0.3;
                    this.targetOffsetY = -dy * force * 0.3;
                    this.brightness = 1 + force * 0.5;
                } else {
                    this.targetOffsetX = breathX;
                    this.targetOffsetY = breathY;
                    this.brightness = 1;
                }
                
                // 부드러운 이동 (관성)
                this.velocityX += (this.targetOffsetX - this.offsetX) * 0.05;
                this.velocityY += (this.targetOffsetY - this.offsetY) * 0.05;
                this.velocityX *= 0.85;
                this.velocityY *= 0.85;
                
                this.offsetX += this.velocityX;
                this.offsetY += this.velocityY;
                
                // 회전 효과
                this.rotation = Math.sin(time * this.frequency * 0.5 + this.phase) * 0.05;
                
                // 스케일 효과
                this.scale = 1 + Math.sin(time * this.frequency + this.phase) * 0.03;
            }

            draw() {
                ctx.save();
                
                // 변환 적용
                const centerX = this.x + this.width / 2 + this.offsetX;
                const centerY = this.y + this.height / 2 + this.offsetY;
                
                ctx.translate(centerX, centerY);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                
                // 밝기 필터
                if (this.brightness > 1) {
                    ctx.filter = `brightness(${this.brightness})`;
                }
                
                // 이미지 세그먼트 그리기
                ctx.drawImage(
                    img,
                    this.x, this.y, this.width, this.height,
                    -this.width / 2, -this.height / 2, this.width, this.height
                );
                
                ctx.filter = 'none';
                ctx.restore();
            }
        }

        // 세그먼트 간 연결 관계
        class Connection {
            constructor(seg1, seg2) {
                this.seg1 = seg1;
                this.seg2 = seg2;
            }

            draw() {
                const x1 = this.seg1.x + this.seg1.width / 2 + this.seg1.offsetX;
                const y1 = this.seg1.y + this.seg1.height / 2 + this.seg1.offsetY;
                const x2 = this.seg2.x + this.seg2.width / 2 + this.seg2.offsetX;
                const y2 = this.seg2.y + this.seg2.height / 2 + this.seg2.offsetY;
                
                const distance = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                const opacity = Math.max(0, 1 - distance / 200) * 0.3;
                
                if (opacity > 0.05) {
                    energyCtx.strokeStyle = `rgba(255, 105, 180, ${opacity})`;
                    energyCtx.lineWidth = 2;
                    energyCtx.beginPath();
                    energyCtx.moveTo(x1, y1);
                    energyCtx.lineTo(x2, y2);
                    energyCtx.stroke();
                }
            }
        }

        // 이미지 로드 및 세그먼트 생성
        img.src = 'gradient-face.jpg';
        img.onload = function() {
            resizeCanvas();
            
            // 그리드 형태로 세그먼트 생성 (이미지의 구조를 따라감)
            const cols = 8;
            const rows = 8;
            const segWidth = width / cols;
            const segHeight = height / rows;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const segment = new Segment(
                        col * segWidth,
                        row * segHeight,
                        segWidth,
                        segHeight,
                        row * cols + col
                    );
                    segments.push(segment);
                }
            }
            
            // 인접한 세그먼트 간 연결 생성
            for (let i = 0; i < segments.length; i++) {
                const seg1 = segments[i];
                const col = i % cols;
                const row = Math.floor(i / cols);
                
                // 오른쪽 연결
                if (col < cols - 1) {
                    connections.push(new Connection(seg1, segments[i + 1]));
                }
                // 아래쪽 연결
                if (row < rows - 1) {
                    connections.push(new Connection(seg1, segments[i + cols]));
                }
                // 대각선 연결
                if (col < cols - 1 && row < rows - 1) {
                    connections.push(new Connection(seg1, segments[i + cols + 1]));
                }
            }
            
            animate();
        };

        // 마우스 이벤트
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => {
            mouse.isDown = true;
        });

        canvas.addEventListener('mouseup', () => {
            mouse.isDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = width / 2;
            mouse.y = height / 2;
        });

        // 터치 이벤트
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.touches[0].clientX - rect.left;
            mouse.y = e.touches[0].clientY - rect.top;
        });

        // 3D 효과
        scene.addEventListener('mousemove', (e) => {
            const rect = scene.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 30;
            const rotateY = (centerX - x) / 30;
            
            scene.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // 애니메이션 루프
        function animate() {
            time += 0.01;
            
            // 클리어
            ctx.clearRect(0, 0, width, height);
            energyCtx.clearRect(0, 0, width, height);
            
            const mouseInfluence = mouse.isDown ? 1.5 : 0.5;
            
            // 세그먼트 업데이트 및 그리기
            segments.forEach(segment => {
                segment.update(time, mouseInfluence);
                segment.draw();
            });
            
            // 연결선 그리기
            connections.forEach(connection => {
                connection.draw();
            });
            
            requestAnimationFrame(animate);
        }

        // 리사이즈 핸들러
        window.addEventListener('resize', () => {
            resizeCanvas();
            segments = [];
            connections = [];
            img.onload();
        });

        // 초기 마우스 위치
        mouse.x = width / 2;
        mouse.y = height / 2;
    </script>
</body>
</html>
