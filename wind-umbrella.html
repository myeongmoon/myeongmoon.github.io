<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Flow Umbrella</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f400;
            overflow: hidden;
            font-family: 'Courier Prime', monospace;
            cursor: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 프레임 테두리 */
        .frame {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            background: #f4f400;
        }

        .frame-top {
            top: 0;
            left: 0;
            right: 0;
            height: 20px;
            border-bottom: 3px solid #000000;
        }

        .frame-bottom {
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            border-top: 3px solid #000000;
        }

        .frame-left {
            top: 0;
            bottom: 0;
            left: 0;
            width: 20px;
            border-right: 3px solid #000000;
        }

        .frame-right {
            top: 0;
            bottom: 0;
            right: 0;
            width: 20px;
            border-left: 3px solid #000000;
        }

        /* 타이틀 */
        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 5;
            color: rgba(0, 0, 0, 0.15);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: 8px;
        }

        /* 네비게이션 */
        .nav-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: #000000;
            color: #f4f400;
            text-decoration: none;
            border: 2px solid #000000;
            transition: all 0.3s;
            z-index: 1000;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            background: #f4f400;
            color: #000000;
        }

        /* 노란색 원 커서 (배경색과 동일, 테두리 없음) */
        .umbrella-cursor {
            position: fixed;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #f4f400;
            pointer-events: none;
            z-index: 9999;
            transition: none;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(0, 0, 0, 0.4);
        }

        /* 인포 */
        .info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 0, 0, 0.6);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 3px;
            z-index: 10;
        }

        /* 범례 */
        .legend {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.85);
            color: #f4f400;
            padding: 20px 25px;
            z-index: 100;
            font-size: 0.85rem;
            border: 2px solid #000000;
        }

        .legend-item {
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .legend-circle {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .red { background: #ff3030; }

        @media (max-width: 768px) {
            .umbrella-cursor {
                display: none;
            }
            body {
                cursor: auto;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="nav-btn">← HOME</a>

    <!-- 프레임 테두리 -->
    <div class="frame frame-top"></div>
    <div class="frame frame-bottom"></div>
    <div class="frame frame-left"></div>
    <div class="frame frame-right"></div>

    <!-- 노란색 원 커서 -->
    <div class="umbrella-cursor" id="umbrellaCursor">UMBRELLA</div>

    <canvas id="canvas"></canvas>

    <div class="title">WIND FLOW</div>

    <div class="legend">
        <div class="legend-item">
            <span class="legend-circle red"></span>PRESSURE
        </div>
        <div class="legend-item">
            <span class="legend-circle" style="background: #f4f400; border: 2px solid #f4f400;"></span>SHIELD
        </div>
    </div>

    <div class="info">MOVE TO DEFLECT THE WIND</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const umbrellaCursor = document.getElementById('umbrellaCursor');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 마우스
        const mouse = {
            x: width / 2,
            y: height / 2,
            radius: 70
        };

        // 마우스 이벤트
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            umbrellaCursor.style.left = e.clientX + 'px';
            umbrellaCursor.style.top = e.clientY + 'px';
        });

        // 등고선 형태의 긴 바람선 클래스
        class ContourLine {
            constructor(startY) {
                this.points = [];
                this.originalPoints = [];
                this.startY = startY;
                this.segments = [];
                
                // 긴 등고선 생성
                const totalPoints = 100;
                const pointSpacing = width / totalPoints;
                
                let allPoints = [];
                for (let i = 0; i <= totalPoints; i++) {
                    const x = i * pointSpacing;
                    
                    // 큰 맥락의 굴곡
                    const bigWave = Math.sin(x * 0.003) * 80;
                    const mediumWave = Math.sin(x * 0.008) * 30;
                    const y = startY + bigWave + mediumWave;
                    
                    allPoints.push({ 
                        x, 
                        y,
                        wobblePhase: Math.random() * Math.PI * 2
                    });
                }
                
                // 랜덤하게 끊어진 세그먼트 생성
                let segmentStart = 0;
                for (let i = 0; i < allPoints.length; i++) {
                    if (Math.random() < 0.08 && i - segmentStart > 10) { // 끊김
                        this.segments.push({ start: segmentStart, end: i });
                        segmentStart = i + Math.floor(Math.random() * 8) + 3;
                    }
                }
                if (segmentStart < allPoints.length - 1) {
                    this.segments.push({ start: segmentStart, end: allPoints.length - 1 });
                }
                
                this.allPoints = allPoints;
                this.displayPoints = JSON.parse(JSON.stringify(allPoints));
            }

            update(time) {
                this.displayPoints.forEach((point, i) => {
                    const original = this.allPoints[i];
                    
                    // 역동적인 전체 움직임 (큰 물결)
                    const bigWaveX = Math.sin(time * 0.8 + original.x * 0.002) * 8;
                    const bigWaveY = Math.cos(time * 0.6 + original.y * 0.003) * 10;
                    
                    // 중간 크기 물결
                    const medWaveX = Math.sin(time * 1.2 + original.wobblePhase) * 4;
                    const medWaveY = Math.cos(time * 0.9 + original.wobblePhase) * 5;
                    
                    // 작은 떨림
                    const wobbleX = Math.sin(time * 2 + original.wobblePhase) * 1.5;
                    const wobbleY = Math.cos(time * 1.8 + original.wobblePhase) * 2;
                    
                    let targetX = original.x + bigWaveX + medWaveX + wobbleX;
                    let targetY = original.y + bigWaveY + medWaveY + wobbleY;
                    
                    // 마우스 영향 - 절대 들어가지 않음
                    const dx = targetX - mouse.x;
                    const dy = targetY - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        const angle = Math.atan2(dy, dx);
                        targetX = mouse.x + Math.cos(angle) * (mouse.radius + 5);
                        targetY = mouse.y + Math.sin(angle) * (mouse.radius + 5);
                    }
                    
                    point.x += (targetX - point.x) * 0.2;
                    point.y += (targetY - point.y) * 0.2;
                });
            }

            draw() {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.8;
                
                this.segments.forEach(segment => {
                    ctx.beginPath();
                    
                    for (let i = segment.start; i <= segment.end; i++) {
                        const point = this.displayPoints[i];
                        
                        if (i === segment.start) {
                            ctx.moveTo(point.x, point.y);
                        } else {
                            // 부드러운 곡선으로 연결
                            const prevPoint = this.displayPoints[i - 1];
                            const midX = (prevPoint.x + point.x) / 2;
                            const midY = (prevPoint.y + point.y) / 2;
                            ctx.quadraticCurveTo(prevPoint.x, prevPoint.y, midX, midY);
                        }
                    }
                    
                    // 마지막 점까지 부드럽게 연결
                    if (segment.end < this.displayPoints.length - 1) {
                        const lastPoint = this.displayPoints[segment.end];
                        ctx.lineTo(lastPoint.x, lastPoint.y);
                    }
                    
                    ctx.stroke();
                });
            }
        }

        // 동그라미 장식 클래스
        class CircleDecoration {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.radius = radius;
                this.wobblePhase = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 역동적인 전체 움직임
                const bigWaveX = Math.sin(time * 0.8 + this.wobblePhase) * 6;
                const bigWaveY = Math.cos(time * 0.6 + this.wobblePhase) * 8;
                
                const medWaveX = Math.sin(time * 1.2 + this.wobblePhase) * 3;
                const medWaveY = Math.cos(time * 0.9 + this.wobblePhase) * 4;
                
                const wobbleX = Math.sin(time * 2 + this.wobblePhase) * 1.5;
                const wobbleY = Math.cos(time * 1.8 + this.wobblePhase) * 2;
                
                let targetX = this.originalX + bigWaveX + medWaveX + wobbleX;
                let targetY = this.originalY + bigWaveY + medWaveY + wobbleY;
                
                const dx = targetX - mouse.x;
                const dy = targetY - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius + this.radius) {
                    const angle = Math.atan2(dy, dx);
                    targetX = mouse.x + Math.cos(angle) * (mouse.radius + this.radius + 5);
                    targetY = mouse.y + Math.sin(angle) * (mouse.radius + this.radius + 5);
                }
                
                this.x += (targetX - this.x) * 0.2;
                this.y += (targetY - this.y) * 0.2;
            }

            draw() {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // 빨간 마커 클래스
        class PressureMarker {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.value = value;
                this.radius = 12 + Math.random() * 8;
                this.wobblePhase = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 역동적인 전체 움직임
                const bigWaveX = Math.sin(time * 0.8 + this.wobblePhase) * 5;
                const bigWaveY = Math.cos(time * 0.6 + this.wobblePhase) * 7;
                
                const medWaveX = Math.sin(time * 1.2 + this.wobblePhase) * 2.5;
                const medWaveY = Math.cos(time * 0.9 + this.wobblePhase) * 3.5;
                
                const wobbleX = Math.sin(time * 2 + this.wobblePhase) * 1;
                const wobbleY = Math.cos(time * 1.8 + this.wobblePhase) * 1.5;
                
                let targetX = this.originalX + bigWaveX + medWaveX + wobbleX;
                let targetY = this.originalY + bigWaveY + medWaveY + wobbleY;
                
                const dx = targetX - mouse.x;
                const dy = targetY - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius + this.radius) {
                    const angle = Math.atan2(dy, dx);
                    targetX = mouse.x + Math.cos(angle) * (mouse.radius + this.radius + 5);
                    targetY = mouse.y + Math.sin(angle) * (mouse.radius + this.radius + 5);
                }
                
                this.x += (targetX - this.x) * 0.2;
                this.y += (targetY - this.y) * 0.2;
            }

            draw() {
                ctx.fillStyle = '#ff3030';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#cc0000';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 10px Courier Prime';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.value, this.x, this.y);
            }
        }

        // 그리드 숫자 클래스
        class GridNumber {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.value = value;
                this.wobblePhase = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 역동적인 전체 움직임
                const bigWaveX = Math.sin(time * 0.8 + this.wobblePhase) * 4;
                const bigWaveY = Math.cos(time * 0.6 + this.wobblePhase) * 6;
                
                const medWaveX = Math.sin(time * 1.2 + this.wobblePhase) * 2;
                const medWaveY = Math.cos(time * 0.9 + this.wobblePhase) * 3;
                
                const wobbleX = Math.sin(time * 2 + this.wobblePhase) * 0.8;
                const wobbleY = Math.cos(time * 1.8 + this.wobblePhase) * 1.2;
                
                let targetX = this.originalX + bigWaveX + medWaveX + wobbleX;
                let targetY = this.originalY + bigWaveY + medWaveY + wobbleY;
                
                const dx = targetX - mouse.x;
                const dy = targetY - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    const angle = Math.atan2(dy, dx);
                    targetX = mouse.x + Math.cos(angle) * (mouse.radius + 5);
                    targetY = mouse.y + Math.sin(angle) * (mouse.radius + 5);
                }
                
                this.x += (targetX - this.x) * 0.2;
                this.y += (targetY - this.y) * 0.2;
            }

            draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.font = '10px Courier Prime';
                ctx.textAlign = 'center';
                ctx.fillText(this.value, this.x, this.y);
            }
        }

        // 등고선 생성
        const contourLines = [];
        const lineSpacing = 35;
        const numLines = Math.ceil(height / lineSpacing) + 10;

        for (let i = 0; i < numLines; i++) {
            const y = i * lineSpacing - 150;
            contourLines.push(new ContourLine(y));
        }

        // 동그라미 장식 생성 (불규칙하게)
        const circles = [];
        for (let i = 0; i < 60; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const radius = 8 + Math.random() * 15;
            circles.push(new CircleDecoration(x, y, radius));
        }

        // 빨간 마커 생성
        const pressureMarkers = [];
        for (let i = 0; i < 18; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const value = Math.floor(Math.random() * 300);
            pressureMarkers.push(new PressureMarker(x, y, value));
        }

        // 그리드 숫자 생성
        const gridNumbers = [];
        for (let i = 0; i < 120; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const value = Math.floor(Math.random() * 400);
            gridNumbers.push(new GridNumber(x, y, value));
        }

        // 그리드 선
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.lineWidth = 0.5;
            
            const spacing = 50;
            
            for (let x = 0; x < width; x += spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            for (let y = 0; y < height; y += spacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        // 애니메이션
        let time = 0;
        
        function animate() {
            time += 0.02;
            
            // 배경
            ctx.fillStyle = '#f4f400';
            ctx.fillRect(0, 0, width, height);

            // 그리드
            drawGrid();

            // 그리드 숫자
            gridNumbers.forEach(num => {
                num.update(time);
                num.draw();
            });

            // 등고선
            contourLines.forEach(line => {
                line.update(time);
                line.draw();
            });

            // 동그라미
            circles.forEach(circle => {
                circle.update(time);
                circle.draw();
            });

            // 빨간 마커
            pressureMarkers.forEach(marker => {
                marker.update(time);
                marker.draw();
            });

            requestAnimationFrame(animate);
        }

        // 리사이즈
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 시작
        animate();

        // 초기 커서 위치
        umbrellaCursor.style.left = (width / 2) + 'px';
        umbrellaCursor.style.top = (height / 2) + 'px';
    </script>
</body>
</html>
