<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Flow Umbrella</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e632;
            overflow: hidden;
            font-family: 'Courier Prime', monospace;
            cursor: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 타이틀 */
        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 5;
            color: rgba(0, 0, 0, 0.15);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: 8px;
        }

        /* 네비게이션 */
        .nav-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: #000000;
            color: #e8e632;
            text-decoration: none;
            border: 2px solid #000000;
            transition: all 0.3s;
            z-index: 1000;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            background: #e8e632;
            color: #000000;
        }

        /* 흰색 원 커서 */
        .umbrella-cursor {
            position: fixed;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid rgba(255, 255, 255, 1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            transform: translate(-50%, -50%);
        }

        /* 인포 */
        .info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 0, 0, 0.6);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 3px;
            z-index: 10;
        }

        /* 범례 */
        .legend {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.85);
            color: #e8e632;
            padding: 20px 25px;
            z-index: 100;
            font-size: 0.85rem;
            border: 2px solid #000000;
        }

        .legend-item {
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .legend-circle {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .red { background: #d64545; }
        .blue { background: #4a90e2; }

        @media (max-width: 768px) {
            .umbrella-cursor {
                display: none;
            }
            body {
                cursor: auto;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="nav-btn">← HOME</a>

    <!-- 흰색 원 커서 -->
    <div class="umbrella-cursor" id="umbrellaCursor"></div>

    <canvas id="canvas"></canvas>

    <div class="title">WIND FLOW</div>

    <div class="legend">
        <div class="legend-item">
            <span class="legend-circle red"></span>PRESSURE
        </div>
        <div class="legend-item">
            <span class="legend-circle" style="background: white;"></span>SHIELD
        </div>
    </div>

    <div class="info">MOVE TO DEFLECT THE WIND</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const umbrellaCursor = document.getElementById('umbrellaCursor');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 마우스
        const mouse = {
            x: width / 2,
            y: height / 2,
            radius: 60
        };

        // 마우스 이벤트
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            umbrellaCursor.style.left = e.clientX + 'px';
            umbrellaCursor.style.top = e.clientY + 'px';
        });

        // 등고선 형태의 긴 바람선 클래스
        class ContourLine {
            constructor(startY, baseAngle) {
                this.points = [];
                this.originalPoints = [];
                this.baseAngle = baseAngle;
                this.startY = startY;
                
                // 긴 등고선 생성 (화면 가로를 가로지름)
                const segments = 80;
                const segmentLength = width / segments;
                
                for (let i = 0; i <= segments; i++) {
                    const x = i * segmentLength;
                    
                    // 큰 맥락의 굴곡 (느린 사인파)
                    const bigWave = Math.sin(x * 0.003) * 80;
                    const mediumWave = Math.sin(x * 0.008) * 30;
                    const y = startY + bigWave + mediumWave;
                    
                    this.originalPoints.push({ 
                        x, 
                        y,
                        wobblePhase: Math.random() * Math.PI * 2
                    });
                    this.points.push({ x, y });
                }
            }

            update(time) {
                this.points.forEach((point, i) => {
                    const original = this.originalPoints[i];
                    
                    // 유기적인 움직임 (기본)
                    const wobbleX = Math.sin(time * 0.5 + original.wobblePhase) * 2;
                    const wobbleY = Math.cos(time * 0.3 + original.wobblePhase) * 3;
                    
                    let targetX = original.x + wobbleX;
                    let targetY = original.y + wobbleY;
                    
                    // 마우스(흰 원)의 영향
                    const dx = targetX - mouse.x;
                    const dy = targetY - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius * 2) {
                        const force = (1 - distance / (mouse.radius * 2)) * 40;
                        const angle = Math.atan2(dy, dx);
                        
                        targetX += Math.cos(angle) * force;
                        targetY += Math.sin(angle) * force;
                    }
                    
                    // 부드럽게 이동
                    point.x += (targetX - point.x) * 0.15;
                    point.y += (targetY - point.y) * 0.15;
                });
            }

            draw() {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                
                // 부드러운 곡선 그리기
                for (let i = 0; i < this.points.length; i++) {
                    const point = this.points[i];
                    
                    if (i === 0) {
                        ctx.moveTo(point.x, point.y);
                    } else {
                        const prevPoint = this.points[i - 1];
                        const midX = (prevPoint.x + point.x) / 2;
                        const midY = (prevPoint.y + point.y) / 2;
                        ctx.quadraticCurveTo(prevPoint.x, prevPoint.y, midX, midY);
                    }
                }
                
                ctx.stroke();
            }
        }

        // 빨간 마커 클래스
        class PressureMarker {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.value = value;
                this.radius = 15 + Math.random() * 10;
                this.wobblePhase = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 기본 유기적 움직임
                const wobbleX = Math.sin(time * 0.4 + this.wobblePhase) * 1.5;
                const wobbleY = Math.cos(time * 0.3 + this.wobblePhase) * 1.5;
                
                let targetX = this.originalX + wobbleX;
                let targetY = this.originalY + wobbleY;
                
                // 마우스 영향
                const dx = targetX - mouse.x;
                const dy = targetY - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius * 1.5) {
                    const force = (1 - distance / (mouse.radius * 1.5)) * 30;
                    const angle = Math.atan2(dy, dx);
                    
                    targetX += Math.cos(angle) * force;
                    targetY += Math.sin(angle) * force;
                }
                
                this.x += (targetX - this.x) * 0.15;
                this.y += (targetY - this.y) * 0.15;
            }

            draw() {
                ctx.fillStyle = '#d64545';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#a03030';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 11px Courier Prime';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.value, this.x, this.y);
            }
        }

        // 그리드 숫자 클래스
        class GridNumber {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.value = value;
                this.wobblePhase = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 기본 유기적 움직임
                const wobbleX = Math.sin(time * 0.35 + this.wobblePhase) * 1;
                const wobbleY = Math.cos(time * 0.25 + this.wobblePhase) * 1;
                
                let targetX = this.originalX + wobbleX;
                let targetY = this.originalY + wobbleY;
                
                // 마우스 영향
                const dx = targetX - mouse.x;
                const dy = targetY - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    const force = (1 - distance / mouse.radius) * 25;
                    const angle = Math.atan2(dy, dx);
                    
                    targetX += Math.cos(angle) * force;
                    targetY += Math.sin(angle) * force;
                }
                
                this.x += (targetX - this.x) * 0.15;
                this.y += (targetY - this.y) * 0.15;
            }

            draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.font = '10px Courier Prime';
                ctx.textAlign = 'center';
                ctx.fillText(this.value, this.x, this.y);
            }
        }

        // 등고선 생성 (긴 바람선)
        const contourLines = [];
        const lineSpacing = 40;
        const numLines = Math.ceil(height / lineSpacing) + 10;

        for (let i = 0; i < numLines; i++) {
            const y = i * lineSpacing - 200;
            const baseAngle = Math.PI * 0.1; // 기본 각도
            contourLines.push(new ContourLine(y, baseAngle));
        }

        // 빨간 마커 생성 (랜덤 위치)
        const pressureMarkers = [];
        for (let i = 0; i < 20; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const value = Math.floor(Math.random() * 300);
            pressureMarkers.push(new PressureMarker(x, y, value));
        }

        // 그리드 숫자 생성
        const gridNumbers = [];
        for (let i = 0; i < 150; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const value = Math.floor(Math.random() * 400);
            gridNumbers.push(new GridNumber(x, y, value));
        }

        // 그리드 선
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = 0.5;
            
            const spacing = 50;
            
            // 세로선
            for (let x = 0; x < width; x += spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            // 가로선
            for (let y = 0; y < height; y += spacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        // 애니메이션
        let time = 0;
        
        function animate() {
            time += 0.02;
            
            // 배경
            ctx.fillStyle = '#e8e632';
            ctx.fillRect(0, 0, width, height);

            // 그리드
            drawGrid();

            // 그리드 숫자 업데이트 및 그리기
            gridNumbers.forEach(num => {
                num.update(time);
                num.draw();
            });

            // 등고선 업데이트 및 그리기
            contourLines.forEach(line => {
                line.update(time);
                line.draw();
            });

            // 빨간 마커 업데이트 및 그리기
            pressureMarkers.forEach(marker => {
                marker.update(time);
                marker.draw();
            });

            requestAnimationFrame(animate);
        }

        // 리사이즈
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 시작
        animate();

        // 초기 커서 위치
        umbrellaCursor.style.left = (width / 2) + 'px';
        umbrellaCursor.style.top = (height / 2) + 'px';
    </script>
</body>
</html>
