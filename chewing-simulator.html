<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewing Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffd6e8 0%, #ffe8f5 50%, #fff5e8 100%);
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 타이틀 */
        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 5;
        }

        .main-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            color: #ff6b9d;
            text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(255, 107, 157, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #ff8fab;
            font-weight: 400;
        }

        /* 네비게이션 */
        .nav-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: #ff6b9d;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 50px;
            transition: all 0.3s;
            z-index: 1000;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
        }

        .nav-btn:hover {
            background: #ff8fab;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 107, 157, 0.4);
        }

        /* 어금니 커서 */
        .molar-cursor {
            position: fixed;
            width: 100px;
            height: 100px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        .molar-cursor.chomping {
            animation: chomp 0.3s ease;
        }

        @keyframes chomp {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(0.9); }
        }

        /* 스코어 */
        .score-board {
            position: fixed;
            top: 30px;
            right: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .score-item {
            margin: 8px 0;
            font-size: 1rem;
            color: #666;
            font-weight: 600;
        }

        .score-number {
            color: #ff6b9d;
            font-size: 1.8rem;
            font-weight: 700;
            margin-left: 10px;
        }

        /* 안내 */
        .info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff8fab;
            font-size: 1rem;
            font-weight: 600;
            z-index: 10;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* 닉네임 입력 모달 */
        .nickname-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .nickname-modal.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            font-size: 2rem;
            color: #ff6b9d;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .modal-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 3px solid #ffd6e8;
            border-radius: 15px;
            margin-bottom: 20px;
            font-family: 'Fredoka', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .modal-input:focus {
            border-color: #ff6b9d;
        }

        .modal-btn {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: #ff8fab;
            transform: translateY(-2px);
        }

        /* 리더보드 */
        .leaderboard {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            max-width: 300px;
        }

        .leaderboard-title {
            font-size: 1.2rem;
            color: #ff6b9d;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            margin: 5px 0;
            background: #fff5f8;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .leaderboard-item.current {
            background: #ffd6e8;
            font-weight: 700;
        }

        .leaderboard-rank {
            color: #ff6b9d;
            font-weight: 700;
            margin-right: 10px;
        }

        .leaderboard-name {
            flex: 1;
            color: #666;
        }

        .leaderboard-score {
            color: #ff6b9d;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .molar-cursor {
                display: none;
            }
            body {
                cursor: auto;
            }
            .leaderboard {
                bottom: 100px;
                right: 20px;
                left: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 닉네임 입력 모달 -->
    <div class="nickname-modal" id="nicknameModal">
        <div class="modal-content">
            <h2 class="modal-title">🦷 Welcome!</h2>
            <p style="color: #999; margin-bottom: 20px;">Enter your nickname</p>
            <p style="color: #ff6b9d; font-size: 0.9rem; margin-bottom: 15px;">⚠️ Game Over at 5 misses!</p>
            <input type="text" class="modal-input" id="nicknameInput" placeholder="Your nickname" maxlength="12">
            <button class="modal-btn" onclick="startGame()">Start Chewing!</button>
        </div>
    </div>
    <a href="index.html" class="nav-btn">← HOME</a>

    <!-- 어금니 커서 -->
    <div class="molar-cursor" id="molarCursor">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 어금니 모양 -->
            <defs>
                <filter id="shadow">
                    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.3"/>
                </filter>
            </defs>
            
            <!-- 상단 어금니 (위턱) -->
            <g id="upperMolar">
                <ellipse cx="50" cy="35" rx="35" ry="20" fill="#fff" stroke="#ffd6e8" stroke-width="3" filter="url(#shadow)"/>
                <ellipse cx="50" cy="32" rx="30" ry="15" fill="#ffe8f5"/>
                <path d="M 35 32 Q 40 28 45 32" stroke="#ffd6e8" stroke-width="2" fill="none"/>
                <path d="M 55 32 Q 60 28 65 32" stroke="#ffd6e8" stroke-width="2" fill="none"/>
                <circle cx="50" cy="30" r="2" fill="#ffd6e8"/>
            </g>
            
            <!-- 하단 어금니 (아래턱) -->
            <g id="lowerMolar">
                <ellipse cx="50" cy="65" rx="35" ry="20" fill="#fff" stroke="#ffd6e8" stroke-width="3" filter="url(#shadow)"/>
                <ellipse cx="50" cy="62" rx="30" ry="15" fill="#ffe8f5"/>
                <path d="M 35 62 Q 40 58 45 62" stroke="#ffd6e8" stroke-width="2" fill="none"/>
                <path d="M 55 62 Q 60 58 65 62" stroke="#ffd6e8" stroke-width="2" fill="none"/>
                <circle cx="50" cy="60" r="2" fill="#ffd6e8"/>
                
                <!-- 뿌리 -->
                <path d="M 35 75 L 40 90 L 45 90 L 50 75" fill="#fff" stroke="#ffd6e8" stroke-width="2"/>
                <path d="M 50 75 L 55 90 L 60 90 L 65 75" fill="#fff" stroke="#ffd6e8" stroke-width="2"/>
            </g>
            
            <!-- 귀여운 얼굴 -->
            <circle cx="42" cy="48" r="2" fill="#ff6b9d"/>
            <circle cx="58" cy="48" r="2" fill="#ff6b9d"/>
            
            <!-- 입 (열림/닫힘 상태) -->
            <g id="mouthClosed">
                <path d="M 45 55 Q 50 57 55 55" stroke="#ff6b9d" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
            <g id="mouthOpen" style="display: none;">
                <ellipse cx="50" cy="55" rx="8" ry="6" fill="#ff6b9d" opacity="0.5"/>
            </g>
        </svg>
    </div>

    <canvas id="canvas"></canvas>

    <div class="title">
        <h1 class="main-title">🦷 CHEWING SIMULATOR</h1>
        <p class="subtitle">Catch & Chew!</p>
    </div>

    <div class="score-board">
        <div class="score-item" style="font-size: 1.1rem; color: #ff6b9d; margin-bottom: 15px;">
            👤 <span id="playerName">Player</span>
        </div>
        <div class="score-item">
            Chewed<span class="score-number" id="chewed">0</span>
        </div>
        <div class="score-item">
            Missed<span class="score-number" id="missed">0</span> / 5
        </div>
    </div>

    <!-- 리더보드 -->
    <div class="leaderboard">
        <div class="leaderboard-title">🏆 TOP 5</div>
        <div id="leaderboardList"></div>
    </div>

    <div class="info">🖱️ Move & Click to Chew!</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const molarCursor = document.getElementById('molarCursor');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 플레이어
        let playerName = '';
        let chewedCount = 0;
        let missedCount = 0;
        const MAX_MISSES = 5;
        let gameOver = false;
        let gameTime = 0;
        let speedMultiplier = 1;

        // 마우스
        const mouse = {
            x: width / 2,
            y: height / 2,
            radius: 50,
            isChomping: false
        };

        // 로컬 스토리지에서 리더보드 불러오기
        function getLeaderboard() {
            const saved = localStorage.getItem('chewingLeaderboard');
            return saved ? JSON.parse(saved) : [];
        }

        // 리더보드 저장
        function saveScore(name, score) {
            let leaderboard = getLeaderboard();
            leaderboard.push({ name, score, date: Date.now() });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10); // 상위 10명만
            localStorage.setItem('chewingLeaderboard', JSON.stringify(leaderboard));
            updateLeaderboardDisplay();
        }

        // 리더보드 표시
        function updateLeaderboardDisplay() {
            const leaderboard = getLeaderboard();
            const listEl = document.getElementById('leaderboardList');
            listEl.innerHTML = '';
            
            leaderboard.slice(0, 5).forEach((entry, index) => {
                const isCurrent = entry.name === playerName && Math.abs(entry.score - chewedCount) < 5;
                const itemEl = document.createElement('div');
                itemEl.className = 'leaderboard-item' + (isCurrent ? ' current' : '');
                itemEl.innerHTML = `
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span class="leaderboard-name">${entry.name}</span>
                    <span class="leaderboard-score">${entry.score}</span>
                `;
                listEl.appendChild(itemEl);
            });
        }

        // 게임 종료
        function endGame() {
            gameOver = true;
            
            // 최종 점수 저장
            if (playerName) {
                saveScore(playerName, chewedCount);
            }
            
            // 게임오버 모달 표시
            setTimeout(() => {
                const restart = confirm(`🦷 GAME OVER!\n\n${playerName}\nFinal Score: ${chewedCount}\n\nPlay again?`);
                if (restart) {
                    location.reload();
                }
            }, 500);
        }

        // 게임 시작
        function startGame() {
            const input = document.getElementById('nicknameInput');
            const nickname = input.value.trim();
            
            if (nickname === '') {
                alert('Please enter your nickname!');
                return;
            }
            
            playerName = nickname;
            document.getElementById('playerName').textContent = playerName;
            document.getElementById('nicknameModal').classList.add('hidden');
            updateLeaderboardDisplay();
            
            // 게임 시작
            gameOver = false;
            chewedCount = 0;
            missedCount = 0;
            gameTime = 0;
            speedMultiplier = 1;
            document.getElementById('chewed').textContent = 0;
            document.getElementById('missed').textContent = 0;
            
            // 15초마다 속도 증가
            setInterval(() => {
                if (!gameOver) {
                    gameTime += 15;
                    speedMultiplier += 0.3;
                    console.log(`Speed increased! Multiplier: ${speedMultiplier.toFixed(1)}x`);
                }
            }, 15000);
        }

        // Enter 키로 시작
        document.getElementById('nicknameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });

        // 마우스 이벤트
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            molarCursor.style.left = e.clientX + 'px';
            molarCursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            mouse.isChomping = true;
            molarCursor.classList.add('chomping');
            
            // 입 벌리기
            const svg = molarCursor.querySelector('svg');
            const upperMolar = svg.getElementById('upperMolar');
            const lowerMolar = svg.getElementById('lowerMolar');
            const mouthClosed = svg.getElementById('mouthClosed');
            const mouthOpen = svg.getElementById('mouthOpen');
            
            // 위아래 어금니 벌리기
            upperMolar.style.transform = 'translateY(-5px)';
            upperMolar.style.transition = 'transform 0.1s ease';
            lowerMolar.style.transform = 'translateY(5px)';
            lowerMolar.style.transition = 'transform 0.1s ease';
            
            // 입 모양 변경
            mouthClosed.style.display = 'none';
            mouthOpen.style.display = 'block';
            
            setTimeout(() => {
                mouse.isChomping = false;
                molarCursor.classList.remove('chomping');
                
                // 입 닫기
                upperMolar.style.transform = 'translateY(0)';
                lowerMolar.style.transform = 'translateY(0)';
                mouthClosed.style.display = 'block';
                mouthOpen.style.display = 'none';
            }, 300);
        });

        // 음식 클래스
        class Food {
            constructor() {
                this.reset();
                this.emoji = this.getRandomEmoji();
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            reset() {
                this.x = Math.random() * (width - 100) + 50;
                this.y = -50;
                this.size = 40 + Math.random() * 30;
                this.speed = (1 + Math.random() * 2) * speedMultiplier; // 난이도 증가
                this.chewLevel = 0;
                this.isBeingChewed = false;
                this.opacity = 1;
                this.emoji = this.getRandomEmoji();
                this.particles = [];
            }

            getRandomEmoji() {
                const emojis = ['🍎', '🍊', '🍌', '🍇', '🍓', '🥕', '🥦', '🍞', '🧀', '🍖', '🍗', '🥐', '🥖', '🍕', '🍔', '🌮'];
                return emojis[Math.floor(Math.random() * emojis.length)];
            }

            update() {
                if (gameOver) return;
                
                if (!this.isBeingChewed) {
                    this.y += this.speed;
                    this.rotation += this.rotationSpeed;
                    
                    // 마우스와 충돌 체크
                    if (mouse.isChomping) {
                        const dx = this.x - mouse.x;
                        const dy = this.y - mouse.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < mouse.radius + this.size / 2) {
                            this.chew();
                        }
                    }
                    
                    // 화면 밖으로 나가면 미스
                    if (this.y > height + 50) {
                        missedCount++;
                        document.getElementById('missed').textContent = missedCount;
                        
                        // 게임오버 체크
                        if (missedCount >= MAX_MISSES) {
                            endGame();
                        }
                        
                        this.reset();
                    }
                } else {
                    // 씹히는 중
                    this.opacity -= 0.05;
                    
                    // 파티클 생성
                    for (let i = 0; i < 2; i++) {
                        this.particles.push({
                            x: this.x,
                            y: this.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            size: Math.random() * 10 + 5,
                            opacity: 1,
                            color: `hsl(${Math.random() * 60 + 10}, 80%, 60%)`
                        });
                    }
                    
                    if (this.opacity <= 0) {
                        this.reset();
                    }
                }
                
                // 파티클 업데이트
                this.particles.forEach((p, index) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3; // 중력
                    p.opacity -= 0.02;
                    
                    if (p.opacity <= 0) {
                        this.particles.splice(index, 1);
                    }
                });
            }

            chew() {
                this.chewLevel++;
                
                if (this.chewLevel >= 3) {
                    // 완전히 씹힘
                    this.isBeingChewed = true;
                    chewedCount++;
                    document.getElementById('chewed').textContent = chewedCount;
                    
                    // 리더보드 업데이트
                    if (playerName) {
                        saveScore(playerName, chewedCount);
                    }
                } else {
                    // 점점 작아짐
                    this.size *= 0.7;
                    
                    // 튕기는 효과
                    this.y -= 20;
                    this.rotation += Math.PI / 4;
                }
            }

            draw() {
                if (this.opacity <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 이모지로 음식 그리기
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // 씹힌 정도에 따라 찌그러진 모양
                if (this.chewLevel > 0) {
                    ctx.scale(1 - this.chewLevel * 0.15, 1 + this.chewLevel * 0.1);
                }
                
                ctx.fillText(this.emoji, 0, 0);
                
                ctx.restore();
                
                // 파티클 그리기
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            }
        }

        // 음식 생성
        const foods = [];
        
        function spawnFood() {
            if (foods.length < 5) {
                foods.push(new Food());
            }
        }

        // 정기적으로 음식 생성
        setInterval(() => {
            if (!gameOver) {
                spawnFood();
            }
        }, 1500);

        // 배경 장식
        function drawBackground() {
            // 부드러운 원들
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 5; i++) {
                const x = (Math.sin(Date.now() * 0.0005 + i) + 1) * width / 2;
                const y = (Math.cos(Date.now() * 0.0003 + i) + 1) * height / 2;
                const size = 50 + Math.sin(Date.now() * 0.001 + i) * 30;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 애니메이션
        function animate() {
            // 배경
            ctx.fillStyle = '#ffd6e8';
            ctx.fillRect(0, 0, width, height);
            
            // 배경 장식
            drawBackground();

            // 음식 업데이트 및 그리기
            foods.forEach((food, index) => {
                food.update();
                food.draw();
            });

            requestAnimationFrame(animate);
        }

        // 리사이즈
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 시작
        animate();

        // 초기 커서 위치
        molarCursor.style.left = (width / 2) + 'px';
        molarCursor.style.top = (height / 2) + 'px';
    </script>
</body>
</html>
