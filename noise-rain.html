<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Rain Shield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            cursor: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 숨겨진 텍스트 (우산으로 드러남) */
        .hidden-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 1;
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 700;
            color: #000000;
            letter-spacing: -4px;
            line-height: 0.9;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 네비게이션 */
        .nav-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: #000000;
            color: white;
            text-decoration: none;
            border: 2px solid #000000;
            transition: all 0.3s;
            z-index: 1000;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        /* 우산 커서 (픽셀 스타일) */
        .umbrella-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
        }

        .umbrella-pixel {
            width: 4px;
            height: 4px;
            background: #000000;
            position: absolute;
            box-shadow: 0 0 1px rgba(255, 255, 255, 0.5);
        }

        /* 정보 텍스트 */
        .info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #000000;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            z-index: 10;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 통계 */
        .stats {
            position: fixed;
            top: 30px;
            right: 30px;
            background: #000000;
            color: #ffffff;
            padding: 20px 30px;
            border: 2px solid #000000;
            z-index: 100;
            font-size: 0.9rem;
        }

        .stat-item {
            margin: 8px 0;
            letter-spacing: 2px;
        }

        .stat-number {
            font-weight: 700;
            margin-left: 10px;
            font-size: 1.3rem;
        }

        @media (max-width: 768px) {
            .umbrella-cursor {
                display: none;
            }
            body {
                cursor: auto;
            }
            .stats {
                top: auto;
                bottom: 100px;
                right: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="nav-btn">← HOME</a>

<body>
    <a href="index.html" class="nav-btn">← HOME</a>

    <!-- 우산 커서 (픽셀로 그림) -->
    <div class="umbrella-cursor" id="umbrellaCursor"></div>

    <canvas id="canvas"></canvas>

    <!-- 숨겨진 텍스트 -->
    <div class="hidden-text" id="hiddenText">
        SAFE<br>ZONE
    </div>

    <!-- 통계 -->
    <div class="stats">
        <div class="stat-item">
            BLOCKED<span class="stat-number" id="blocked">0</span>
        </div>
        <div class="stat-item">
            REVEALED<span class="stat-number" id="revealed">0</span>%
        </div>
    </div>

    <div class="info">MOVE TO REVEAL</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const umbrellaCursor = document.getElementById('umbrellaCursor');
        const hiddenText = document.getElementById('hiddenText');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 통계
        let blockedCount = 0;
        let revealedPercent = 0;

        // 마우스
        const mouse = {
            x: width / 2,
            y: height / 2,
            vx: 0,
            vy: 0
        };

        // 픽셀 우산 생성
        function createPixelUmbrella() {
            umbrellaCursor.innerHTML = '';
            
            // 우산 형태를 픽셀로 정의 (80x80 영역)
            const umbrellaPattern = [
                // 우산 상단 곡선 (y: 0-20)
                {x: 40, y: 0}, {x: 36, y: 0}, {x: 44, y: 0},
                {x: 32, y: 4}, {x: 40, y: 4}, {x: 48, y: 4},
                {x: 28, y: 8}, {x: 36, y: 8}, {x: 44, y: 8}, {x: 52, y: 8},
                {x: 24, y: 12}, {x: 32, y: 12}, {x: 40, y: 12}, {x: 48, y: 12}, {x: 56, y: 12},
                {x: 20, y: 16}, {x: 28, y: 16}, {x: 36, y: 16}, {x: 44, y: 16}, {x: 52, y: 16}, {x: 60, y: 16},
                {x: 16, y: 20}, {x: 24, y: 20}, {x: 32, y: 20}, {x: 40, y: 20}, {x: 48, y: 20}, {x: 56, y: 20}, {x: 64, y: 20},
                
                // 우산 중간
                {x: 12, y: 24}, {x: 20, y: 24}, {x: 28, y: 24}, {x: 40, y: 24}, {x: 52, y: 24}, {x: 60, y: 24}, {x: 68, y: 24},
                {x: 8, y: 28}, {x: 16, y: 28}, {x: 24, y: 28}, {x: 40, y: 28}, {x: 56, y: 28}, {x: 64, y: 28}, {x: 72, y: 28},
                {x: 4, y: 32}, {x: 12, y: 32}, {x: 20, y: 32}, {x: 40, y: 32}, {x: 60, y: 32}, {x: 68, y: 32}, {x: 76, y: 32},
                
                // 우산 살 (중앙)
                {x: 40, y: 0}, {x: 40, y: 4}, {x: 40, y: 8}, {x: 40, y: 12}, {x: 40, y: 16}, {x: 40, y: 20}, 
                {x: 40, y: 24}, {x: 40, y: 28}, {x: 40, y: 32}, {x: 40, y: 36},
                
                // 손잡이
                {x: 40, y: 40}, {x: 40, y: 44}, {x: 40, y: 48}, {x: 40, y: 52}, {x: 40, y: 56},
                {x: 40, y: 60}, {x: 44, y: 60}, {x: 48, y: 60}, {x: 52, y: 60},
            ];

            umbrellaPattern.forEach(pos => {
                const pixel = document.createElement('div');
                pixel.className = 'umbrella-pixel';
                pixel.style.left = pos.x + 'px';
                pixel.style.top = pos.y + 'px';
                umbrellaCursor.appendChild(pixel);
            });
        }

        createPixelUmbrella();

        // 커서 업데이트
        document.addEventListener('mousemove', (e) => {
            const dx = e.clientX - mouse.x;
            const dy = e.clientY - mouse.y;
            
            mouse.vx = dx;
            mouse.vy = dy;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // 우산 커서 위치
            umbrellaCursor.style.left = (e.clientX - 40) + 'px';
            umbrellaCursor.style.top = (e.clientY - 30) + 'px';
            
            // 움직임에 따른 기울기
            const tiltX = Math.max(-5, Math.min(5, dx * 0.2));
            umbrellaCursor.style.transform = `rotateZ(${tiltX}deg)`;
        });

        // 노이즈 블록 클래스 (이미지 패턴 유지)
        class NoiseBlock {
            constructor(x, y, pattern) {
                this.x = x;
                this.y = y;
                this.originalY = y;
                this.pattern = pattern; // 픽셀 패턴 배열
                this.speed = 0.5; // 느리게
                this.blocked = false;
                this.opacity = 1;
                this.cleared = false;
            }

            update() {
                if (!this.blocked && !this.cleared) {
                    this.y += this.speed;
                    
                    // 우산 충돌 체크
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    
                    // 우산 영역 (더 정확하게)
                    const inUmbrellaX = Math.abs(dx) < 80;
                    const inUmbrellaY = dy < 40 && dy > -10;
                    
                    if (inUmbrellaX && inUmbrellaY) {
                        this.blocked = true;
                        this.cleared = true;
                        blockedCount++;
                    }
                    
                    // 화면 밖으로 나가면 리셋
                    if (this.y > height + 50) {
                        this.y = this.originalY - height - 50;
                        this.blocked = false;
                        this.cleared = false;
                    }
                }
            }

            draw() {
                if (this.cleared) return;
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                // 패턴 그리기
                this.pattern.forEach(pixel => {
                    ctx.fillStyle = pixel.color === 'black' ? '#000000' : '#ffffff';
                    ctx.fillRect(
                        this.x + pixel.x,
                        this.y + pixel.y,
                        pixel.size,
                        pixel.size
                    );
                });
                
                ctx.restore();
            }
        }

        // 노이즈 패턴 생성 (이미지처럼)
        function generateNoisePattern() {
            const pattern = [];
            const gridSize = 20; // 20x20 블록
            
            for (let px = 0; px < gridSize; px++) {
                for (let py = 0; py < gridSize; py++) {
                    const random = Math.random();
                    if (random < 0.5) { // 50% 확률로 검은색
                        // 클러스터 효과
                        const clusterSize = Math.random() < 0.7 ? 1 : (Math.random() < 0.5 ? 2 : 3);
                        for (let i = 0; i < clusterSize; i++) {
                            pattern.push({
                                x: px * 4 + Math.floor(Math.random() * 4),
                                y: py * 4 + Math.floor(Math.random() * 4),
                                size: Math.random() < 0.5 ? 2 : 3,
                                color: 'black'
                            });
                        }
                    }
                }
            }
            
            return pattern;
        }

        // 노이즈 블록 그리드 생성
        const blocks = [];
        const blockSpacing = 100;
        
        for (let x = 0; x < width + blockSpacing; x += blockSpacing) {
            for (let y = -height * 2; y < height; y += blockSpacing) {
                const pattern = generateNoisePattern();
                blocks.push(new NoiseBlock(x, y, pattern));
            }
        }

        let time = 0;
        let lastRevealUpdate = 0;

        // 애니메이션
        function animate() {
            time += 0.02;

            // 배경
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            // 블록 업데이트 및 그리기
            let clearedCount = 0;
            blocks.forEach(block => {
                block.update();
                block.draw();
                if (block.cleared) clearedCount++;
            });

            // 드러난 비율 계산
            revealedPercent = Math.floor((clearedCount / blocks.length) * 100);
            
            // 텍스트 표시 (30% 이상 드러나면)
            if (revealedPercent > 30) {
                hiddenText.style.opacity = Math.min(1, (revealedPercent - 30) / 70);
            } else {
                hiddenText.style.opacity = 0;
            }

            // 통계 업데이트
            if (time - lastRevealUpdate > 0.1) {
                document.getElementById('blocked').textContent = blockedCount;
                document.getElementById('revealed').textContent = revealedPercent;
                lastRevealUpdate = time;
            }

            requestAnimationFrame(animate);
        }

        // 리사이즈
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 시작
        animate();

        // 초기 커서 위치
        umbrellaCursor.style.left = (width / 2 - 40) + 'px';
        umbrellaCursor.style.top = (height / 2 - 30) + 'px';
    </script>
</body>
</html>
